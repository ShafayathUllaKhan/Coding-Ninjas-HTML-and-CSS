<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards and Models</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script
    defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</head>
 <body>
    <div class="container pt-5">
      <form>
        <div class="form-floating">
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="Fullname"
          />
          <label for="name" class="form-label">Name:</label>
        </div>

        <label for="color" class="form-label">Pick:</label>
        <input
          type="color"
          id="color"
          class="form-control form-control-color"
        />
        <label for="range" class="form-label">select:</label>
        <input type="range" id="range" class="form-range" />

        <select class="form-select">
          <option>Indian</option>
          <option>Non-resident</option>
        </select>

        <div class="form-check form-switch">
          <input type="checkbox" id="checkbox" class="form-check-input" />
          <label for="checkbox" class="form-check-label">select</label>
        </div>

        <button class="btn btn-primary">Submit</button>
      </form>
    </div>
</body>
</html>
